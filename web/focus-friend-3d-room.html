<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专注伙伴 - 3D房间</title>
    <style>
        /* 颜色变量 */
        :root {
            --bg-1: hsl(250, 28%, 11%);
            --bg-2: hsl(250, 28%, 5%);
            --white-1: #FBFAFE;
            --white-2: #9E99C1;
            --white-3: #383358;
            --white-4: #282347;
            --black-1: #1f2158;
            --black-2: #1a1c48;
            --black-3: #161838;
            --neon-1: hsl(220, 95%, 65%);
            --neon-2: hsl(210, 68%, 49%);
            --cuadro-1: #D51E24;
            --cuadro-2: #0F1110;
            --cuadro-3: #0F1120;

        }

        /* 全局样式 */
        *,
        *::after,
        *::before {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            transform-style: preserve-3d;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            cursor: pointer;
            background-image: radial-gradient(circle, var(--bg-1), hsl(250, 28%, 5%));
        }

        .face {
            position: absolute;
        }

        /* 3D 房间基础样式 */
        .house {
            position: absolute;
            width: 28vw;
            height: 28vw;
            transform: perspective(90vw) rotateX(75deg) rotateZ(45deg) translateZ(-9vw);
        }

        .h-shadow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: 1.5vw -3vw 3vw var(--bg-2), 1.5vw .5vw 1.5vw var(--bg-2);
        }

        .h-lights {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translateX(-50%) translateY(-50%);
            width: 45vw;
            height: 45vw;
        }

        .h-light {
            position: absolute;
        }

        .h-light:nth-of-type(1) {
            bottom: 5vw;
            right: 0;
            width: 14vw;
            height: 14vw;
            border-radius: 50%;
            background-image: radial-gradient(hsl(250, 28%, 13%), transparent);
            filter: blur(1vw);
        }

        .h-light:nth-of-type(2) {
            bottom: 18vw;
            right: -1vw;
            width: 2vw;
            height: 12vw;
            border-radius: 50%;
            transform: rotateZ(-50deg);
            background-image: radial-gradient(rgba(84, 116, 251, 0.45) 50%, rgba(40, 60, 210, 0.45), transparent);
            box-shadow: -1vw -1vw 2vw 1vw rgba(135, 160, 255, 0.1);
            filter: blur(1vw);
        }

        .h-light:nth-of-type(3) {
            bottom: -2vw;
            right: 17vw;
            width: 5vw;
            height: 12vw;
            border-radius: 50%;
            transform: rotateZ(-50deg);
            background-image: radial-gradient(rgba(84, 116, 251, 0.5) 50%, rgba(40, 60, 210, 0.5), transparent);
            filter: blur(2vw);
        }

        .h-light:nth-of-type(3)::before,
        .h-light:nth-of-type(3)::after {
            content: '';
            position: absolute;
            width: 200%;
            top: -6vw;
            height: 400%;
            background-image: linear-gradient(to bottom, rgba(40, 60, 210, 0.1), rgba(84, 116, 251, 0.1), transparent);
            border-top-left-radius: 10vw;
            border-top-right-radius: 10vw;
            filter: blur(1.5vw);
        }

        .h-light:nth-of-type(3)::before {
            right: -50%;
            transform-origin: top right;
            transform: rotateZ(15deg);
            box-shadow: -2vw -2vw 0 rgba(84, 116, 251, 0.075);
        }

        .h-light:nth-of-type(3)::after {
            left: -50%;
            transform-origin: top left;
            transform: rotateZ(-15deg);
            box-shadow: 2vw -2vw 0 rgba(84, 116, 251, 0.075);
        }

        .h-light:nth-of-type(4) {
            bottom: 5vw;
            left: 8vw;
            width: 28vw;
            height: 4vw;
            transform-origin: top left;
            transform: skewX(58deg);
            background-image: linear-gradient(to right, rgba(84, 116, 251, 0.075) 10%, transparent 25%, transparent, rgba(26, 24, 44, 0.15));
            filter: blur(.25vw);
        }

        .h-light:nth-of-type(6) {
            bottom: 14vw;
            right: 2vw;
            width: 8vw;
            height: 16vw;
            transform-origin: bottom left;
            transform: skewY(49deg);
            background-image: linear-gradient(to left, rgba(51, 0, 0, 0.1), rgba(51, 0, 0, 0.7));
            filter: blur(.35vw);
        }

        /* 墙壁结构 */
        .alt {
            position: absolute;
            left: 0;
            top: 0;
            width: 27vw;
            height: 27vw;
        }

        .alt__front {
            width: 27vw;
            height: 0.5vw;
            background-color: var(--white-2);
            transform-origin: bottom left;
            transform: rotateX(-90deg) translateZ(-(0.5vw - (13.5vw * 2)));
        }

        .alt__back {
            width: 27vw;
            height: 0.5vw;
            background-color: var(--white-3);
            transform-origin: top left;
            transform: rotateX(-90deg) rotateY(180deg) translateX(-27vw) translateY(-0.5vw);
        }

        .alt__right {
            width: 27vw;
            height: 0.5vw;
            background-color: var(--white-3);
            transform-origin: top left;
            transform: rotateY(90deg) rotateZ(-90deg) translateZ(27vw) translateX(-27vw) translateY(-0.5vw);
        }

        .alt__left {
            width: 27vw;
            height: 0.5vw;
            background-color: var(--white-1);
            transform-origin: top left;
            transform: rotateY(-90deg) rotateZ(90deg) translateY(-0.5vw);
        }

        .alt__top {
            width: 27vw;
            height: 27vw;
            background-image: linear-gradient(to bottom, var(--black-3), var(--white-3), var(--white-2));
            transform-origin: top left;
            transform: translateZ(0.5vw);
        }

        .alt__top .light:nth-of-type(1) {
            position: absolute;
            height: 100%;
            width: 100%;
            background-image: linear-gradient(to bottom, rgba(40, 60, 210, 0.75), rgba(84, 116, 251, 0.75), transparent);
        }

        .alt__top .light:nth-of-type(2) {
            position: absolute;
            left: 4vw;
            height: 100%;
            width: 6vw;
            background-image: linear-gradient(to bottom, transparent 20%, rgba(40, 60, 210, 0.75), rgba(84, 116, 251, 0.25) 80%);
            filter: blur(.1vw);
        }

        .alt__top .light:nth-of-type(3) {
            position: absolute;
            bottom: 10vw;
            left: 5vw;
            width: 6vw;
            height: 3vw;
            border-radius: 50%;
            transform: rotateZ(42deg);
            background-image: radial-gradient(rgba(135, 160, 255, 0.75) 50%, rgba(40, 60, 210, 0.75));
            filter: blur(.55vw);
        }

        .alt__top .light:nth-of-type(4) {
            position: absolute;
            bottom: 7vw;
            left: 4vw;
            width: 8.5vw;
            height: 2vw;
            border-radius: 50%;
            transform: rotateZ(40deg);
            background-image: radial-gradient(rgba(135, 160, 255, 0.75) 50%, rgba(40, 60, 210, 0.75));
            filter: blur(.55vw);
        }

        .alt__top .light:nth-of-type(5) {
            position: absolute;
            bottom: 3.5vw;
            left: 4.5vw;
            width: 6vw;
            height: 2vw;
            border-radius: 50%;
            transform: rotateZ(40deg);
            background-image: radial-gradient(rgba(147, 170, 255, 0.75) 50%, rgba(40, 60, 210, 0.75));
            filter: blur(.75vw);
        }

        .alt__top .light:nth-of-type(6) {
            position: absolute;
            bottom: 3vw;
            left: .5vw;
            width: 4vw;
            height: 2vw;
            border-radius: 50%;
            transform: rotateZ(40deg);
            background-image: radial-gradient(rgba(147, 170, 255, 0.75) 50%, rgba(40, 60, 210, 0.75));
            filter: blur(.35vw);
        }

        .alt__top .light:nth-of-type(7) {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(to right, #0f111e, var(--neon-1) 10%, transparent 20%);
        }

        .alt__top .light:nth-of-type(7)::before {
            content: '';
            position: absolute;
            width: 20%;
            height: 100%;
            background-image: linear-gradient(to right, rgba(40, 60, 210, 0.6), transparent 60%);
        }

        .alt__top .light:nth-of-type(7)::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 20%;
            background-image: linear-gradient(to bottom, rgba(40, 60, 210, 0.5), transparent 60%);
        }

        .alt__top .light:nth-of-type(8) {
            position: absolute;
            bottom: 5vw;
            left: 10vw;
            width: 6vw;
            height: 4vw;
            border-radius: 50%;
            transform: rotateZ(40deg);
            background-image: radial-gradient(rgba(251, 250, 254, 0.1) 50%, rgba(158, 153, 193, 0.1));
            filter: blur(.8vw);
        }

        .alt__bottom {
            width: 27vw;
            height: 27vw;
            background-color: var(--white-3);
            transform-origin: top left;
            transform: rotateY(180deg) translateX(-27vw);
        }

        /* 地板 */
        .alb {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 27vw;
            height: 1vw;
        }

        .alb__front {
            width: 27vw;
            height: 2vw;
            background-image: linear-gradient(to right, var(--white-2) 40%, #8A85B1);
            transform-origin: bottom left;
            transform: rotateX(-90deg) translateZ(-(2vw - (0.5vw * 2)));
        }

        .alb__back {
            width: 27vw;
            height: 2vw;
            background-color: var(--white-3);
            transform-origin: top left;
            transform: rotateX(-90deg) rotateY(180deg) translateX(-27vw) translateY(-2vw);
        }

        .alb__right {
            width: 1vw;
            height: 2vw;
            background-color: var(--white-3);
            transform-origin: top left;
            transform: rotateY(90deg) rotateZ(-90deg) translateZ(27vw) translateX(-1vw) translateY(-2vw);
        }

        .alb__left {
            width: 1vw;
            height: 2vw;
            background-color: var(--white-1);
            transform-origin: top left;
            transform: rotateY(-90deg) rotateZ(90deg) translateY(-2vw);
        }

        .alb__top {
            width: 27vw;
            height: 1vw;
            background-image: linear-gradient(to right, var(--white-1) 40%, #E6E5F0);
            transform-origin: top left;
            transform: translateZ(2vw);
        }

        .alb__bottom {
            width: 27vw;
            height: 1vw;
            background-color: var(--white-3);
            transform-origin: top left;
            transform: rotateY(180deg) translateX(-27vw);
        }

        /* 右侧墙壁 */
        .arb {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 1vw;
            height: 28vw;
        }

        .arb__front {
            width: 1vw;
            height: 2vw;
            background-color: #8A85B1;
            transform-origin: bottom left;
            transform: rotateX(-90deg) translateZ(-(2vw - (14vw * 2)));
        }

        .arb__back {
            width: 1vw;
            height: 2vw;
            background-color: var(--white-3);
            transform-origin: top left;
            transform: rotateX(-90deg) rotateY(180deg) translateX(-1vw) translateY(-2vw);
        }

        .arb__right {
            width: 28vw;
            height: 2vw;
            background-image: linear-gradient(to right, var(--white-4) 40%, #1a182c);
            transform-origin: top left;
            transform: rotateY(90deg) rotateZ(-90deg) translateZ(1vw) translateX(-28vw) translateY(-2vw);
        }

        .arb__left {
            width: 28vw;
            height: 2vw;
            background-color: var(--white-2);
            transform-origin: top left;
            transform: rotateY(-90deg) rotateZ(90deg) translateY(-2vw);
        }

        .arb__top {
            width: 1vw;
            height: 28vw;
            background-image: linear-gradient(to top, var(--white-1), #322e4a 25%, #1a182c 75%, var(--white-2));
            transform-origin: top left;
            transform: translateZ(2vw);
        }

        .arb__top::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 30%;
            top: 0;
            background-image: linear-gradient(to bottom, transparent, rgba(84, 116, 251, 0.85), transparent);
        }

        .arb__bottom {
            width: 1vw;
            height: 28vw;
            background-color: var(--white-3);
            transform-origin: top left;
            transform: rotateY(180deg) translateX(-1vw);
        }

        /* 左侧墙壁 */
        .blt {
            position: absolute;
            left: 0;
            top: 0;
            width: 1vw;
            height: 27vw;
            transform: translateZ(.5vw);
        }

        .blt__front {
            width: 1vw;
            height: 20vw;
            background-image: linear-gradient(to bottom, var(--white-3), var(--white-2));
            transform-origin: bottom left;
            transform: rotateX(-90deg) translateZ(-(20vw - (13.5vw * 2)));
        }

        .blt__back {
            width: 1vw;
            height: 20vw;
            background-color: var(--white-3);
            transform-origin: top left;
            transform: rotateX(-90deg) rotateY(180deg) translateX(-1vw) translateY(-20vw);
        }

        .blt__right {
            width: 27vw;
            height: 20vw;
            background-image: linear-gradient(to bottom, #1a182c, var(--white-3), var(--white-3) 90%, #1c193a);
            transform-origin: top left;
            transform: rotateY(90deg) rotateZ(-90deg) translateZ(1vw) translateX(-27vw) translateY(-20vw);
        }

        .blt__right::before {
            content: '';
            position: absolute;
            bottom: 0;
            width: 100%;
            height: .75vw;
            background-image: linear-gradient(to bottom, #8A85B1, var(--neon-2));
            border-top: .1vw solid var(--white-4);
            border-bottom: .1vw solid var(--white-4);
        }

        .blt__right::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(to bottom, rgba(40, 60, 210, 0.35), transparent 30%, transparent 70%, rgba(40, 60, 210, 0.35));
        }

        .blt__left {
            width: 27vw;
            height: 20vw;
            background-color: var(--white-1);
            transform-origin: top left;
            transform: rotateY(-90deg) rotateZ(90deg) translateY(-20vw);
        }

        .blt__bottom {
            width: 1vw;
            height: 27vw;
            background-color: var(--white-3);
            transform-origin: top left;
            transform: rotateY(180deg) translateX(-1vw);
        }

        /* 左侧墙壁装饰 */
        .blt2 {
            position: absolute;
            left: 0;
            top: 0;
            width: 2vw;
            height: 27vw;
            transform: translateZ(20.5vw);
        }

        .blt2__front {
            width: 2vw;
            height: 0.75vw;
            background-color: var(--white-3);
            transform-origin: bottom left;
            transform: rotateX(-90deg) translateZ(-(0.75vw - (13.5vw * 2)));
        }

        .blt2__back {
            width: 2vw;
            height: 0.75vw;
            background-color: var(--white-3);
            transform-origin: top left;
            transform: rotateX(-90deg) rotateY(180deg) translateX(-2vw) translateY(-0.75vw);
        }

        .blt2__right {
            width: 27vw;
            height: 0.75vw;
            background-image: linear-gradient(to right, #8A85B1, var(--white-2), #7A75A1);
            transform-origin: top left;
            transform: rotateY(90deg) rotateZ(-90deg) translateZ(2vw) translateX(-27vw) translateY(-0.75vw);
        }

        .blt2__right::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            bottom: 0;
            border-bottom: .1vw solid rgba(251, 250, 254, 0.75);
            background-image: linear-gradient(to top, rgba(84, 116, 251, 0.35), transparent);
        }

        .blt2__left {
            width: 27vw;
            height: 0.75vw;
            background-color: var(--white-1);
            transform-origin: top left;
            transform: rotateY(-90deg) rotateZ(90deg) translateY(-0.75vw);
        }

        .blt2__top {
            width: 2vw;
            height: 27vw;
            background-image: linear-gradient(to top, var(--white-2), var(--white-1));
            transform-origin: top left;
            transform: translateZ(0.75vw);
        }

        .blt2__bottom {
            width: 2vw;
            height: 27vw;
            background-color: var(--white-3);
            transform-origin: top left;
            transform: rotateY(180deg) translateX(-2vw);
        }

        /* 后墙 */
        .blb {
            position: absolute;
            left: 1vw;
            top: 0;
            width: 26vw;
            height: 1vw;
            transform: translateZ(.5vw);
        }

        .blb__front {
            width: 26vw;
            height: 20vw;
            background-image: linear-gradient(to bottom, #5A557B, #6A658B 20%, #5A557B);
            transform-origin: bottom left;
            transform: rotateX(-90deg) translateZ(-(20vw - (0.5vw * 2)));
        }

        .blb__front::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(to bottom, rgba(40, 60, 210, 0.25), transparent 20%, transparent 80%, rgba(40, 60, 210, 0.5)),
                            linear-gradient(to right, rgba(31, 33, 88, 0.35), transparent),
                            linear-gradient(to bottom, rgba(31, 33, 88, 0.35), transparent),
                            linear-gradient(to bottom, rgba(10, 20, 100, 0.5), transparent 20%, transparent 80%, rgba(40, 60, 210, 0.25));
        }

        .blb__front::after {
            content: '';
            position: absolute;
            bottom: 0;
            width: 100%;
            height: .75vw;
            background-image: linear-gradient(to bottom, #8A85B1, var(--neon-2));
            border-top: .1vw solid var(--white-4);
            border-bottom: .1vw solid var(--white-4);
        }

        .blb__back {
            width: 26vw;
            height: 20vw;
            background-color: var(--white-3);
            transform-origin: top left;
            transform: rotateX(-90deg) rotateY(180deg) translateX(-26vw) translateY(-20vw);
        }

        .blb__right {
            width: 1vw;
            height: 20vw;
            background-image: linear-gradient(to bottom, #1a182c, #161426 80%, #1a182c);
            transform-origin: top left;
            transform: rotateY(90deg) rotateZ(-90deg) translateZ(26vw) translateX(-1vw) translateY(-20vw);
        }

        .blb__bottom {
            width: 26vw;
            height: 1vw;
            background-color: var(--white-3);
            transform-origin: top left;
            transform: rotateY(180deg) translateX(-26vw);
        }

        /* 后墙装饰 */
        .blb2 {
            position: absolute;
            left: 2vw;
            top: 0;
            width: 25vw;
            height: 1vw;
            transform: translateZ(20.5vw);
        }

        .blb2__front {
            width: 25vw;
            height: 0.75vw;
            background-image: linear-gradient(to right, #7A75A1, var(--white-2), #8A85B1);
            transform-origin: bottom left;
            transform: rotateX(-90deg) translateZ(-(0.75vw - (1vw * 2)));
        }

        .blb2__front::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            bottom: 0;
            border-bottom: .1vw solid rgba(251, 250, 254, 0.75);
            background-image: linear-gradient(to top, rgba(40, 60, 210, 0.25), transparent);
        }

        .blb2__back {
            width: 25vw;
            height: 0.75vw;
            background-color: var(--white-3);
            transform-origin: top left;
            transform: rotateX(-90deg) rotateY(180deg) translateX(-25vw) translateY(-0.75vw);
        }

        .blb2__right {
            width: 2vw;
            height: 0.75vw;
            background-color: #1a182c;
            transform-origin: top left;
            transform: rotateY(90deg) rotateZ(-90deg) translateZ(25vw) translateX(-2vw) translateY(-0.75vw);
        }

        .blb2__left {
            width: 2vw;
            height: 0.75vw;
            background-color: var(--white-2);
            transform-origin: top left;
            transform: rotateY(-90deg) rotateZ(90deg) translateY(-0.75vw);
        }

        .blb2__top {
            width: 25vw;
            height: 2vw;
            background-image: linear-gradient(to left, var(--white-2), var(--white-1));
            transform-origin: top left;
            transform: translateZ(0.75vw);
        }

        .blb2__bottom {
            width: 25vw;
            height: 2vw;
            background-color: var(--white-3);
            transform-origin: top left;
            transform: rotateY(180deg) translateX(-25vw);
        }

        /* 扬声器 */
        .bocina-l,
        .bocina-r {
            position: absolute;
            left: 1.5vw;
            bottom: 5.25vw;
            width: .75vw;
            height: 1.5vw;
            transform: translateZ(8vw);
        }

        .bocina-l__right,
        .bocina-r__right {
            width: 1.5vw;
            height: 6vw;
            background-image: radial-gradient(#0f111e, #0a0c19);
            transform-origin: top left;
            transform: rotateY(90deg) rotateZ(-90deg) translateZ(0.75vw) translateX(-1.5vw) translateY(-6vw);
        }

        .bocina-l__top,
        .bocina-r__top {
            width: 0.75vw;
            height: 1.5vw;
            background-image: linear-gradient(to left, #E6E5F0, var(--white-2), #7A75A1);
            transform-origin: top left;
            transform: translateZ(6vw);
        }

        .bocina-l__bottom,
        .bocina-r__bottom {
            width: 0.75vw;
            height: 1.5vw;
            background-color: var(--white-3);
            transform-origin: top left;
            transform: rotateY(180deg) translateX(-0.75vw);
        }

        .bocina-l__front {
            width: 0.75vw;
            height: 6vw;
            background-image: linear-gradient(to right, var(--neon-1), #6A658B 30%, #E6E5F0);
            transform-origin: bottom left;
            transform: rotateX(-90deg) translateZ(-(6vw - (0.75vw * 2)));
        }

        .bocina-l__back {
            width: 0.75vw;
