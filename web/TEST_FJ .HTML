<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Three.js 房间入门示例</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #info {
            position: absolute; top: 20px; left: 20px;
            color: white; background: rgba(0,0,0,0.6);
            padding: 10px 20px; border-radius: 30px;
            pointer-events: none; z-index: 10;
            backdrop-filter: blur(5px);
        }
        #controls-hint {
            position: absolute; bottom: 20px; left: 20px;
            color: rgba(255,255,255,0.8); background: rgba(0,0,0,0.4);
            padding: 8px 16px; border-radius: 20px;
            font-size: 14px; pointer-events: none; z-index: 10;
            backdrop-filter: blur(4px);
        }
        #toggle-btn {
            position: absolute; bottom: 20px; right: 20px;
            padding: 12px 24px; background: #ff4757; color: white;
            border: none; border-radius: 40px; font-size: 16px;
            font-weight: bold; cursor: pointer; z-index: 20;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: none;
            transition: transform 0.2s, background 0.2s;
        }
        #toggle-btn:hover { background: #ff6b81; transform: scale(1.05); }
        #toggle-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="info">🏠 Three.js 基础房间 | 点击下方按钮开关门</div>
    <div id="controls-hint">🖱️ 鼠标拖动旋转视角 | 滚轮缩放</div>
    <button id="toggle-btn">🚪 开门</button>

    <!-- 引入 Three.js 核心库和辅助库 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- 初始化场景、相机、渲染器 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122); // 深色背景衬托

        // 透视相机 (视角45度, 宽高比自动, 近裁面0.1, 远裁面1000)
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 5, 12);
        camera.lookAt(0, 0, 0);

        // WebGL渲染器
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // 开启阴影
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // 柔和阴影
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 限制最大2倍像素比以保证性能
        document.body.appendChild(renderer.domElement);

        // CSS2渲染器用于文字标签 (不受光照影响)
        const css2DRenderer = new CSS2DRenderer();
        css2DRenderer.setSize(window.innerWidth, window.innerHeight);
        css2DRenderer.domElement.style.position = 'absolute';
        css2DRenderer.domElement.style.top = '0px';
        css2DRenderer.domElement.style.left = '0px';
        css2DRenderer.domElement.style.pointerEvents = 'none';  // 让点击穿透
        document.body.appendChild(css2DRenderer.domElement);

        // --- 轨道控制器 (实现视角旋转/缩放) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;      // 启用惯性效果
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.target.set(0, 1, 0);
        controls.maxPolarAngle = Math.PI / 2; // 限制不能看到地板下面

        // --- 光照系统 (打造立体感) ---
        // 1. 环境光 (提供基础照明)
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);
        
        // 2. 主光源 - 产生阴影的平行光 (模拟太阳)
        const dirLight = new THREE.DirectionalLight(0xfff5d1, 1.2);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        const d = 12;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);
        
        // 添加辅助对象显示光源位置 (可选)
        // scene.add(new THREE.DirectionalLightHelper(dirLight));
        
        // 3. 补光源 - 暖色点光源 (增加温馨感)
        const pointLight1 = new THREE.PointLight(0xffaa66, 0.8, 20);
        pointLight1.position.set(-3, 3, 4);
        scene.add(pointLight1);
        
        const pointLight2 = new THREE.PointLight(0x6688ff, 0.6, 20);
        pointLight2.position.set(4, 2, -3);
        scene.add(pointLight2);
        
        // 4. 辅助背光
        const backLight = new THREE.PointLight(0x4466aa, 0.4);
        backLight.position.set(-2, 1, -5);
        scene.add(backLight);

        // 可选: 添加一个小助手显示点光源位置 (调试用)
        // scene.add(new THREE.PointLightHelper(pointLight1));

        // --- 辅助元素 (帮助理解空间) ---
        // 网格辅助 (地面)
        const gridHelper = new THREE.GridHelper(20, 20, 0x88aaff, 0x334466);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);
        
        // 坐标轴辅助 (红X, 绿Y, 蓝Z), 长度5
        // scene.add(new THREE.AxesHelper(5));

        // --- 构建房间 (一个5面盒子: 地板 + 4面墙壁) ---
        const roomWidth = 8;
        const roomDepth = 8;
        const roomHeight = 4;
        const wallThickness = 0.2;
        
        // 材质定义
        const floorMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x8B5E3C, 
            roughness: 0.7, 
            metalness: 0.1,
            emissive: new THREE.Color(0x332211)
        });
        const wallMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xE8DCC8, 
            roughness: 0.6,
            emissive: new THREE.Color(0x222222)
        });
        const wallMaterialOutside = new THREE.MeshStandardMaterial({ 
            color: 0xBCAAA4, 
            roughness: 0.7,
            side: THREE.DoubleSide
        });
        
        // 辅助函数: 创建墙体 (带厚度)
        function createWall(width, height, depth, colorMat, pos, rotY = 0) {
            const geometry = new THREE.BoxGeometry(width, height, depth);
            const mesh = new THREE.Mesh(geometry, colorMat);
            mesh.position.set(pos.x, pos.y, pos.z);
            mesh.rotation.y = rotY;
            mesh.receiveShadow = true;
            mesh.castShadow = true;
            return mesh;
        }

        // 地板
        const floor = new THREE.Mesh(
            new THREE.BoxGeometry(roomWidth, wallThickness, roomDepth),
            floorMaterial
        );
        floor.position.set(0, -wallThickness/2, 0);
        floor.receiveShadow = true;
        floor.castShadow = false;
        scene.add(floor);

        // 天花板 (可注释掉以方便观察内部)
        // const ceiling = new THREE.Mesh(
        //     new THREE.BoxGeometry(roomWidth, wallThickness, roomDepth),
        //     new THREE.MeshStandardMaterial({ color: 0xDDDDDD, roughness: 0.8 })
        // );
        // ceiling.position.set(0, roomHeight - wallThickness/2, 0);
        // ceiling.receiveShadow = true;
        // ceiling.castShadow = true;
        // scene.add(ceiling);

        // 后墙 (-Z方向)
        const backWall = createWall(roomWidth, roomHeight, wallThickness, wallMaterial, 
            new THREE.Vector3(0, roomHeight/2, -roomDepth/2), 0);
        scene.add(backWall);
        
        // 前墙 (+Z方向) - 将开门洞，这里先建整墙，然后用门遮挡？ 简化: 建两面半墙或者用门模型。这里我们建两个半墙来模拟门洞。
        const halfWidth = (roomWidth - 1.2) / 2; // 门宽1.2
        const leftFrontWall = createWall(halfWidth, roomHeight, wallThickness, wallMaterial, 
            new THREE.Vector3(-roomWidth/2 + halfWidth/2, roomHeight/2, roomDepth/2), 0);
        const rightFrontWall = createWall(halfWidth, roomHeight, wallThickness, wallMaterial, 
            new THREE.Vector3(roomWidth/2 - halfWidth/2, roomHeight/2, roomDepth/2), 0);
        scene.add(leftFrontWall);
        scene.add(rightFrontWall);
        
        // 左墙 (-X)
        const leftWall = createWall(wallThickness, roomHeight, roomDepth, wallMaterial, 
            new THREE.Vector3(-roomWidth/2, roomHeight/2, 0), 0);
        scene.add(leftWall);
        
        // 右墙 (+X)
        const rightWall = createWall(wallThickness, roomHeight, roomDepth, wallMaterial, 
            new THREE.Vector3(roomWidth/2, roomHeight/2, 0), 0);
        scene.add(rightWall);

        // 给墙壁添加简单的踢脚线/装饰条 (可选)
        function addSkirtingBoard() {
            const skirtingMat = new THREE.MeshStandardMaterial({ color: 0xBCAAA4, roughness: 0.5 });
            const h = 0.15;
            const w = 0.1;
            // 左
            const s1 = new THREE.Mesh(new THREE.BoxGeometry(w, h, roomDepth-0.4), skirtingMat);
            s1.position.set(-roomWidth/2 + 0.05, h/2, 0);
            s1.receiveShadow = true; s1.castShadow = true;
            scene.add(s1);
            // 右
            const s2 = s1.clone();
            s2.position.set(roomWidth/2 - 0.05, h/2, 0);
            scene.add(s2);
            // 后
            const s3 = new THREE.Mesh(new THREE.BoxGeometry(roomWidth-0.4, h, w), skirtingMat);
            s3.position.set(0, h/2, -roomDepth/2 + 0.05);
            s3.receiveShadow = true; s3.castShadow = true;
            scene.add(s3);
        }
        addSkirtingBoard();

        // --- 创建门 (可交互) ---
        const doorGroup = new THREE.Group();
        const doorWidth = 1.2;
        const doorHeight = 2.8;
        const doorThickness = 0.08;
        
        // 门板
        const doorMat = new THREE.MeshStandardMaterial({ color: 0xA0522D, roughness: 0.4, metalness: 0.1 });
        const doorMatFrame = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.6 });
        
        const doorPanel = new THREE.Mesh(new THREE.BoxGeometry(doorWidth, doorHeight, doorThickness), doorMat);
        doorPanel.castShadow = true;
        doorPanel.receiveShadow = true;
        doorPanel.position.y = doorHeight/2;
        doorGroup.add(doorPanel);
        
        // 门把手 (一个小球体)
        const knob = new THREE.Mesh(new THREE.SphereGeometry(0.05, 16, 16), new THREE.MeshStandardMaterial({ color: 0xFFD700, roughness: 0.3, metalness: 0.8 }));
        knob.position.set(doorWidth/2 - 0.1, doorHeight/2, doorThickness/2 + 0.02);
        knob.castShadow = true;
        doorGroup.add(knob);
        
        // 门框装饰 (简单的几条线)
        const frameGeo = new THREE.BoxGeometry(0.05, doorHeight, 0.05);
        const frameMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
        const frameLeft = new THREE.Mesh(frameGeo, frameMat);
        frameLeft.position.set(-doorWidth/2 - 0.03, doorHeight/2, 0);
        frameLeft.castShadow = true; frameLeft.receiveShadow = true;
        doorGroup.add(frameLeft);
        
        const frameRight = frameLeft.clone();
        frameRight.position.set(doorWidth/2 + 0.03, doorHeight/2, 0);
        doorGroup.add(frameRight);
        
        const frameTop = new THREE.Mesh(new THREE.BoxGeometry(doorWidth + 0.1, 0.05, 0.05), frameMat);
        frameTop.position.set(0, doorHeight + 0.03, 0);
        frameTop.castShadow = true; frameTop.receiveShadow = true;
        doorGroup.add(frameTop);
        
        // 将门组放置在门洞位置 (前墙中间)
        doorGroup.position.set(0, 0, roomDepth/2 + 0.01);
        doorGroup.castShadow = true;
        doorGroup.receiveShadow = true;
        scene.add(doorGroup);

        // 添加一个简单的标签显示门的状态
        const doorLabelDiv = document.createElement('div');
        doorLabelDiv.textContent = '🚪 门';
        doorLabelDiv.style.color = '#fff';
        doorLabelDiv.style.fontSize = '14px';
        doorLabelDiv.style.fontWeight = 'bold';
        doorLabelDiv.style.textShadow = '1px 1px 3px black';
        doorLabelDiv.style.backgroundColor = 'rgba(0,0,0,0.5)';
        doorLabelDiv.style.padding = '4px 12px';
        doorLabelDiv.style.borderRadius = '20px';
        doorLabelDiv.style.pointerEvents = 'none';
        doorLabelDiv.style.backdropFilter = 'blur(2px)';
        
        const doorLabel = new CSS2DObject(doorLabelDiv);
        doorLabel.position.set(0, 3.2, roomDepth/2 + 0.3);
        scene.add(doorLabel);

        // --- 房间内添加一些简单家具 (让房间更有感觉) ---
        // 一张桌子
        const tableMat = new THREE.MeshStandardMaterial({ color: 0xDEB887, roughness: 0.5 });
        const tableLegMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.7 });
        
        const tableTop = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.1, 1.5), tableMat);
        tableTop.position.set(1.5, 1.0, -1.5);
        tableTop.castShadow = true;
        tableTop.receiveShadow = true;
        scene.add(tableTop);
        
        const legPositions = [
            [-0.8, -0.6], [0.8, -0.6], [-0.8, 0.6], [0.8, 0.6]
        ];
        legPositions.forEach(pos => {
            const leg = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.9, 0.2), tableLegMat);
            leg.position.set(1.5 + pos[0], 0.45, -1.5 + pos[1]);
            leg.castShadow = true;
            leg.receiveShadow = true;
            scene.add(leg);
        });
        
        // 一把椅子 (简化)
        const chairGroup = new THREE.Group();
        const chairMat = new THREE.MeshStandardMaterial({ color: 0x4682B4, roughness: 0.4 });
        const seat = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.1, 0.8), chairMat);
        seat.position.y = 0.5;
        seat.castShadow = true; seat.receiveShadow = true;
        chairGroup.add(seat);
        
        const back = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.1), chairMat);
        back.position.set(0, 0.9, -0.35);
        back.castShadow = true; back.receiveShadow = true;
        chairGroup.add(back);
        
        const legPosChair = [[-0.3, -0.3], [0.3, -0.3], [-0.3, 0.3], [0.3, 0.3]];
        legPosChair.forEach(pos => {
            const leg = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.5, 0.1), tableLegMat);
            leg.position.set(pos[0], 0.25, pos[1]);
            leg.castShadow = true; leg.receiveShadow = true;
            chairGroup.add(leg);
        });
        
        chairGroup.position.set(0.5, 0, -1.8);
        chairGroup.rotation.y = 0.3;
        chairGroup.castShadow = true;
        chairGroup.receiveShadow = true;
        scene.add(chairGroup);
        
        // 一个画框挂在后墙
        const pictureFrame = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.9, 0.05), new THREE.MeshStandardMaterial({ color: 0xCD853F }));
        pictureFrame.position.set(-2, 2.2, -roomDepth/2 + 0.03);
        pictureFrame.castShadow = true; pictureFrame.receiveShadow = true;
        scene.add(pictureFrame);
        
        const pictureCanvas = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.7, 0.06), new THREE.MeshStandardMaterial({ color: 0x87CEEB }));
        pictureCanvas.position.set(-2, 2.2, -roomDepth/2 + 0.06);
        pictureCanvas.castShadow = true; pictureCanvas.receiveShadow = true;
        scene.add(pictureCanvas);
        
        // 一个小地毯
        const rugGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.05, 32);
        const rugMat = new THREE.MeshStandardMaterial({ color: 0x8FBC8F, roughness: 0.9 });
        const rug = new THREE.Mesh(rugGeo, rugMat);
        rug.position.set(-1.5, 0.03, 1.8);
        rug.rotation.y = 0.3;
        rug.receiveShadow = true;
        rug.castShadow = false;
        scene.add(rug);

        // --- 交互逻辑: 开关门 ---
        let isDoorOpen = false;
        const doorClosedPosZ = roomDepth/2 + 0.01;
        const doorOpenRotY = -Math.PI / 2; // 打开90度
        
        const toggleBtn = document.getElementById('toggle-btn');
        
        toggleBtn.addEventListener('click', () => {
            isDoorOpen = !isDoorOpen;
            
            if (isDoorOpen) {
                // 开门: 旋转门组
                doorGroup.rotation.y = doorOpenRotY;
                // 稍微调整位置避免穿模
                doorGroup.position.z = roomDepth/2 + 0.2;
                toggleBtn.textContent = '🚪 关门';
                doorLabelDiv.textContent = '🚪 门 (已开)';
            } else {
                doorGroup.rotation.y = 0;
                doorGroup.position.z = doorClosedPosZ;
                toggleBtn.textContent = '🚪 开门';
                doorLabelDiv.textContent = '🚪 门 (已关)';
            }
        });
        
        // 键盘 Enter 键也可以控制 (作为备选)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                toggleBtn.click();
            }
        });

        // --- 辅助: 窗口大小自适应 ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            css2DRenderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- 动画循环 ---
        function animate() {
            requestAnimationFrame(animate);
            
            controls.update(); // 更新控制器 (阻尼效果)
            
            // 渲染主场景
            renderer.render(scene, camera);
            css2DRenderer.render(scene, camera);
        }
        
        animate();

        // 控制台提示
        console.log('Three.js 房间示例已启动！点击按钮或按Enter键开关门。');
    </script>
</body>
</html>
