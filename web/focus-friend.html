<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Friend - 专注助手</title>
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #333;
        }

        /* 容器 */
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin: 20px 0;
        }

        /* 标题 */
        h1 {
            text-align: center;
            color: #ff6b6b;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        /* 番茄钟区域 */
        .timer-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .timer-display {
            font-size: 3.5rem;
            font-weight: bold;
            color: #4ecdc4;
            margin: 20px 0;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .timer-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        .timer-controls button {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #startBtn {
            background: #4ecdc4;
            color: white;
        }

        #pauseBtn {
            background: #ffd93d;
            color: #333;
        }

        #resetBtn {
            background: #ff6b6b;
            color: white;
        }

        .timer-controls button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        /* 时间设置 */
        .time-settings {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        .time-setting {
            text-align: center;
        }

        .time-setting label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #666;
        }

        .time-setting input {
            width: 80px;
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            text-align: center;
            font-size: 1rem;
        }

        /* 角色区域 */
        .character-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .character-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 20px auto;
            background: #f8f9fa;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .character {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            position: relative;
            transition: all 0.3s ease;
        }

        .character::before {
            content: '';
            position: absolute;
            top: 40px;
            left: 30px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            box-shadow: 60px 0 0 white;
        }

        .character::after {
            content: '';
            position: absolute;
            top: 80px;
            left: 55px;
            width: 40px;
            height: 20px;
            border-radius: 20px;
            background: #ff6b6b;
        }

        .character.happy::after {
            height: 25px;
            border-radius: 0 0 40px 40px;
            background: #4ecdc4;
        }

        /* 装扮系统 */
        .dress-up-section {
            margin-bottom: 40px;
        }

        .dress-up-section h2 {
            text-align: center;
            color: #4ecdc4;
            margin-bottom: 20px;
        }

        .outfits {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
        }

        .outfit {
            width: 80px;
            height: 80px;
            border-radius: 15px;
            border: 2px solid #e0e0e0;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .outfit:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .outfit.selected {
            border-color: #4ecdc4;
            box-shadow: 0 0 15px rgba(78, 205, 196, 0.5);
        }

        .outfit:nth-child(1) {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
        }

        .outfit:nth-child(2) {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        }

        .outfit:nth-child(3) {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .outfit:nth-child(4) {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        /* 广告区域 */
        .ad-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .ad-section h3 {
            color: #666;
            margin-bottom: 15px;
        }

        .ad-content {
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .ad-content p {
            color: #333;
            margin-bottom: 10px;
        }

        .ad-button {
            padding: 10px 20px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .ad-button:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }

        /* 统计信息 */
        .stats-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .stats-section h2 {
            text-align: center;
            color: #4ecdc4;
            margin-bottom: 15px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff6b6b;
        }

        .stat-label {
            color: #666;
            font-size: 0.9rem;
        }

        /* 响应式设计 */
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .timer-display {
                font-size: 2.5rem;
            }

            .timer-controls {
                flex-direction: column;
                align-items: center;
            }

            .timer-controls button {
                width: 200px;
            }

            .time-settings {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }

            .outfits {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }

            .stats {
                flex-direction: column;
                gap: 10px;
            }
        }

        /* 动画效果 */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }

        .character.bounce {
            animation: bounce 2s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Focus Friend</h1>
        
        <!-- 番茄钟区域 -->
        <div class="timer-section">
            <h2>番茄钟</h2>
            <div class="timer-display" id="timer">25:00</div>
            <div class="timer-controls">
                <button id="startBtn">开始</button>
                <button id="pauseBtn" disabled>暂停</button>
                <button id="resetBtn">重置</button>
            </div>
            <div class="time-settings">
                <div class="time-setting">
                    <label for="workTime">工作时间 (分钟)</label>
                    <input type="number" id="workTime" value="25" min="1" max="60">
                </div>
                <div class="time-setting">
                    <label for="breakTime">休息时间 (分钟)</label>
                    <input type="number" id="breakTime" value="5" min="1" max="30">
                </div>
            </div>
        </div>
        
        <!-- 角色区域 -->
        <div class="character-section">
            <h2>我的伙伴</h2>
            <div class="character-container">
                <div class="character" id="character"></div>
            </div>
            <p id="characterStatus">准备就绪！</p>
        </div>
        
        <!-- 装扮系统 -->
        <div class="dress-up-section">
            <h2>装扮系统</h2>
            <div class="outfits">
                <div class="outfit selected" data-outfit="1"></div>
                <div class="outfit" data-outfit="2"></div>
                <div class="outfit" data-outfit="3"></div>
                <div class="outfit" data-outfit="4"></div>
            </div>
        </div>
        
        <!-- 广告区域 -->
        <div class="ad-section">
            <h3>广告</h3>
            <div class="ad-content">
                <p>想获得更多装扮？观看广告解锁！</p>
                <button class="ad-button" id="watchAdBtn">观看广告</button>
            </div>
        </div>
        
        <!-- 统计信息 -->
        <div class="stats-section">
            <h2>统计信息</h2>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalPomodoros">0</div>
                    <div class="stat-label">完成的番茄数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalTime">0</div>
                    <div class="stat-label">专注时间 (分钟)</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="adViews">0</div>
                    <div class="stat-label">广告观看次数</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 全局变量
        let timerInterval;
        let timeLeft = 25 * 60; // 25分钟
        let isRunning = false;
        let isWorkTime = true;
        let workTime = 25 * 60;
        let breakTime = 5 * 60;
        let totalPomodoros = 0;
        let totalMinutes = 0;
        let adViews = 0;
        let selectedOutfit = 1;
        
        // DOM元素
        const timerDisplay = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const workTimeInput = document.getElementById('workTime');
        const breakTimeInput = document.getElementById('breakTime');
        const character = document.getElementById('character');
        const characterStatus = document.getElementById('characterStatus');
        const watchAdBtn = document.getElementById('watchAdBtn');
        const totalPomodorosElement = document.getElementById('totalPomodoros');
        const totalTimeElement = document.getElementById('totalTime');
        const adViewsElement = document.getElementById('adViews');
        const outfits = document.querySelectorAll('.outfit');
        
        // 初始化
        function init() {
            loadData();
            updateTimerDisplay();
            updateStats();
            updateCharacter();
        }
        
        // 加载数据
        function loadData() {
            const savedData = localStorage.getItem('focusFriendData');
            if (savedData) {
                const data = JSON.parse(savedData);
                totalPomodoros = data.totalPomodoros || 0;
                totalMinutes = data.totalMinutes || 0;
                adViews = data.adViews || 0;
                selectedOutfit = data.selectedOutfit || 1;
                workTime = (data.workTime || 25) * 60;
                breakTime = (data.breakTime || 5) * 60;
                timeLeft = workTime;
                
                // 更新输入框
                workTimeInput.value = Math.floor(workTime / 60);
                breakTimeInput.value = Math.floor(breakTime / 60);
                
                // 更新选中的装扮
                outfits.forEach(outfit => {
                    if (parseInt(outfit.dataset.outfit) === selectedOutfit) {
                        outfit.classList.add('selected');
                    } else {
                        outfit.classList.remove('selected');
                    }
                });
            }
        }
        
        // 保存数据
        function saveData() {
            const data = {
                totalPomodoros,
                totalMinutes,
                adViews,
                selectedOutfit,
                workTime: Math.floor(workTime / 60),
                breakTime: Math.floor(breakTime / 60)
            };
            localStorage.setItem('focusFriendData', JSON.stringify(data));
        }
        
        // 更新计时器显示
        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
        
        // 更新统计信息
        function updateStats() {
            totalPomodorosElement.textContent = totalPomodoros;
            totalTimeElement.textContent = totalMinutes;
            adViewsElement.textContent = adViews;
        }
        
        // 更新角色状态
        function updateCharacter() {
            // 清除所有类
            character.className = 'character';
            
            // 添加选中的装扮
            character.classList.add(`outfit-${selectedOutfit}`);
            
            // 根据状态添加不同的类
            if (isRunning) {
                character.classList.add('bounce');
                characterStatus.textContent = isWorkTime ? '一起专注吧！' : '休息一下！';
            } else {
                characterStatus.textContent = '准备就绪！';
            }
        }
        
        // 开始计时器
        function startTimer() {
            if (!isRunning) {
                isRunning = true;
                startBtn.disabled = true;
                pauseBtn.disabled = false;
                
                timerInterval = setInterval(() => {
                    timeLeft--;
                    updateTimerDisplay();
                    
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        isRunning = false;
                        startBtn.disabled = false;
                        pauseBtn.disabled = true;
                        
                        // 完成一个番茄钟
                        if (isWorkTime) {
                            totalPomodoros++;
                            totalMinutes += Math.floor(workTime / 60);
                            character.classList.add('happy');
                            characterStatus.textContent = '完成！休息一下吧！';
                            isWorkTime = false;
                            timeLeft = breakTime;
                        } else {
                            characterStatus.textContent = '休息结束，开始新的专注！';
                            isWorkTime = true;
                            timeLeft = workTime;
                        }
                        
                        updateStats();
                        saveData();
                        updateTimerDisplay();
                    }
                }, 1000);
                
                updateCharacter();
            }
        }
        
        // 暂停计时器
        function pauseTimer() {
            if (isRunning) {
                isRunning = false;
                clearInterval(timerInterval);
                startBtn.disabled = false;
                pauseBtn.disabled = true;
                characterStatus.textContent = '已暂停';
                updateCharacter();
            }
        }
        
        // 重置计时器
        function resetTimer() {
            isRunning = false;
            clearInterval(timerInterval);
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            isWorkTime = true;
            timeLeft = workTime;
            updateTimerDisplay();
            characterStatus.textContent = '准备就绪！';
            updateCharacter();
        }
        
        // 模拟观看广告
        function watchAd() {
            adViews++;
            updateStats();
            saveData();
            
            // 显示广告观看成功消息
            alert('广告观看成功！获得了新的装扮！');
        }
        
        // 事件监听器
        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resetBtn.addEventListener('click', resetTimer);
        watchAdBtn.addEventListener('click', watchAd);
        
        // 工作时间和休息时间输入变化
        workTimeInput.addEventListener('change', function() {
            const value = parseInt(this.value) || 25;
            workTime = value * 60;
            if (isWorkTime && !isRunning) {
                timeLeft = workTime;
                updateTimerDisplay();
            }
            saveData();
        });
        
        breakTimeInput.addEventListener('change', function() {
            const value = parseInt(this.value) || 5;
            breakTime = value * 60;
            if (!isWorkTime && !isRunning) {
                timeLeft = breakTime;
                updateTimerDisplay();
            }
            saveData();
        });
        
        // 装扮选择
        outfits.forEach(outfit => {
            outfit.addEventListener('click', function() {
                outfits.forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
                selectedOutfit = parseInt(this.dataset.outfit);
                updateCharacter();
                saveData();
            });
        });
        
        // 初始化应用
        init();
    </script>
</body>
</html>
